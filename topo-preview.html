<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>拓扑预览</title>
<link rel="stylesheet" href="dashboard.css">
<script src="https://unpkg.com/@antv/g6@4/dist/g6.min.js"></script>
<style>
body { margin: 0; background: #F8FAFC; height: 100vh; display: flex; flex-direction: column; }
#topo-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topo-canvas-wrap { flex: 1; position: relative; background: #F8FAFC; min-height: 0; }
.topo-main-graph { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="topo-wrap">
  <div class="topo-canvas-wrap">
    <div id="topoMainGraph" class="topo-main-graph"></div>
  </div>
</div>
<script src="dashboard.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Render DC1 (the one with warn/crit nodes)
  topoSelectedDC = 'dc1';
  topoLevel = 'dc';
  topoFilter = 'all';
  topoHighlightNode = null;
  renderTopoDC('dc1');
});
</script>
</body>
</html>
