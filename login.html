<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1">
<title>N-Compass · 登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   N-COMPASS  ·  Central-Symmetry Login (1080p)
   ═══════════════════════════════════════════════════════ */

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --accent:#22C55E;
  --accent-glow:#22C55E80;
  --accent-deep:#16A34A;
  --accent-light:#4ADE80;
  --cyan:#06B6D4;
  --cyan-glow:#06B6D440;
  --bg-dark:#0a0e17;
  --bg-mid:#111827;
  --surface:rgba(17,24,39,0.65);
  --surface-border:rgba(255,255,255,0.06);
  --text-primary:#f0fdf4;
  --text-secondary:#94a3b8;
  --text-muted:#475569;
  --input-bg:rgba(15,23,42,0.8);
  --input-border:rgba(148,163,184,0.15);
  --input-focus:var(--accent);
  --radius:12px;
  --font-display:'Orbitron',sans-serif;
  --font-ui:'Rajdhani','Noto Sans SC',sans-serif;
  --font-body:'Noto Sans SC','Rajdhani',sans-serif;
}

html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:var(--font-body);
  background:var(--bg-dark);color:var(--text-primary);
}

/* ── Particle Canvas ──────────────────────────────── */
#particleCanvas{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;
}

/* ── Aurora background (CSS layer, below canvas) ─── */
.aurora{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  overflow:hidden;
}
.aurora::before,
.aurora::after{
  content:'';
  position:absolute;
  border-radius:50%;
  filter:blur(160px);
  opacity:0;
  animation:auroraFloat 20s ease-in-out infinite;
}
.aurora::before{
  width:900px;height:600px;
  top:-200px;left:-200px;
  background:radial-gradient(ellipse,rgba(34,197,94,0.08) 0%,rgba(6,182,212,0.05) 40%,transparent 70%);
  animation-delay:0s;
}
.aurora::after{
  width:800px;height:500px;
  bottom:-180px;right:-180px;
  background:radial-gradient(ellipse,rgba(6,182,212,0.07) 0%,rgba(34,197,94,0.04) 40%,transparent 70%);
  animation-delay:-10s;
}
.aurora-mid{
  position:absolute;
  width:600px;height:400px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  border-radius:50%;
  filter:blur(140px);
  background:radial-gradient(ellipse,rgba(34,197,94,0.04) 0%,rgba(99,102,241,0.03) 50%,transparent 70%);
  opacity:0;
  animation:auroraFloat 28s ease-in-out infinite reverse;
  animation-delay:-7s;
}
@keyframes auroraFloat{
  0%  {opacity:0;transform:scale(1)   translate(0px,0px)}
  15% {opacity:1}
  50% {opacity:0.7;transform:scale(1.15) translate(30px,-20px)}
  85% {opacity:1}
  100%{opacity:0;transform:scale(1)   translate(0px,0px)}
}

/* ── Radar canvas ────────────────────────────── */
#radarCanvas{
  position:fixed;inset:0;z-index:1;pointer-events:none;
}

.grid-overlay{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    linear-gradient(rgba(34,197,94,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,197,94,0.025) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 60% 55% at 50% 50%, black 30%, transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse 60% 55% at 50% 50%, black 30%, transparent 75%);
}

/* ── Central axis line (the symmetry axis) ────────── */
.axis-line{
  position:fixed;top:0;bottom:0;left:50%;z-index:1;pointer-events:none;
  width:1px;transform:translateX(-50%);
  background:linear-gradient(to bottom,
    transparent 0%,
    rgba(34,197,94,0.06) 20%,
    rgba(34,197,94,0.12) 50%,
    rgba(34,197,94,0.06) 80%,
    transparent 100%);
}
.axis-line::before{
  content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 12px var(--accent-glow);
}

/* ── Ambient glow blobs (symmetric) ───────────────── */
.ambient{
  position:fixed;z-index:1;pointer-events:none;border-radius:50%;filter:blur(120px);
}
.ambient-1{
  width:520px;height:520px;top:50%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle, rgba(34,197,94,0.10) 0%, transparent 70%);
  animation:ambientPulse 8s ease-in-out infinite;
}
.ambient-2{
  width:380px;height:380px;top:-120px;left:-80px;
  background:radial-gradient(circle, rgba(34,197,94,0.06) 0%, transparent 70%);
  animation:ambientFloat 20s ease-in-out infinite;
}
.ambient-3{
  width:380px;height:380px;bottom:-120px;right:-80px;
  background:radial-gradient(circle, rgba(6,182,212,0.05) 0%, transparent 70%);
  animation:ambientFloat 25s ease-in-out infinite reverse;
}
@keyframes ambientFloat{
  0%,100%{transform:translate(0,0)}
  33%{transform:translate(30px,-20px)}
  66%{transform:translate(-15px,30px)}
}
@keyframes ambientPulse{
  0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
}

/* ── Scan line ────────────────────────────────────── */
.scan-line{
  position:fixed;z-index:2;pointer-events:none;
  width:100%;height:2px;top:0;left:0;
  background:linear-gradient(90deg, transparent, var(--accent-glow), var(--accent), var(--accent-glow), transparent);
  opacity:0.25;
  animation:scanDown 8s linear infinite;
}
@keyframes scanDown{
  0%{top:-2px}100%{top:100vh}
}

/* ── Main container — centered symmetry ───────────── */
.login-wrapper{
  position:relative;z-index:10;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  padding:24px 48px;
}

.login-stage{
  width:100%;max-width:560px;
  display:flex;flex-direction:column;align-items:stretch;
  position:relative;
  animation:stageEntry 1s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity:0;transform:translateY(20px);
}
@keyframes stageEntry{
  to{opacity:1;transform:translateY(0)}
}

/* ── Top brand bar (spans all columns, centered) ──── */
.brand-bar{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:20px;
  animation:brandEntry 1s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
  opacity:0;transform:translateY(-15px);
}
@keyframes brandEntry{
  to{opacity:1;transform:translateY(0)}
}

.logo-container{
  position:relative;width:120px;height:120px;
  margin-bottom:12px;
}
.logo-glow{
  position:absolute;inset:-22px;border-radius:50%;
  background:radial-gradient(circle, rgba(34,197,94,0.12) 0%, transparent 70%);
  z-index:-1;pointer-events:none;
}
.logo-svg{
  position:absolute;inset:0;
  filter:
    drop-shadow(0 4px 12px rgba(0,0,0,0.5))
    drop-shadow(0 0 10px rgba(34,197,94,0.2));
}
.brand-name{
  font-family:var(--font-display);
  font-size:22px;font-weight:700;
  letter-spacing:4px;
  text-transform:lowercase;
  background:linear-gradient(135deg, #e2e8f0 0%, #ffffff 40%, #94a3b8 60%, #ffffff 100%);
  background-size:200% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:metallicShine 3s ease-in-out infinite;
}
@keyframes metallicShine{
  0%{background-position:200% center}
  100%{background-position:-200% center}
}
.brand-sub{
  font-family:var(--font-ui);font-size:10px;font-weight:500;
  color:var(--text-muted);letter-spacing:3px;margin-top:4px;
  text-transform:uppercase;
}

/* ── Central login card ───────────────────────────── */
.login-card{
  width:100%;
  padding:40px 44px 36px;
  border-radius:20px;
  background:rgba(10, 16, 26, 0.65);
  border:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(25px) saturate(120%);
  -webkit-backdrop-filter:blur(25px) saturate(120%);
  position:relative;overflow:hidden;
  animation:cardEntry 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
  opacity:0;transform:translateY(20px) scale(0.97);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.01),
    inset 0 1px 2px rgba(255,255,255,0.05),
    inset 0 -1px 2px rgba(0,0,0,0.3),
    0 8px 32px rgba(0,0,0,0.3),
    0 24px 80px rgba(0,0,0,0.2),
    0 0 100px rgba(34,197,94,0.08);
}
@keyframes cardEntry{
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Card top shimmer */
.login-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent 0%, rgba(100,200,220,0.1) 25%, rgba(100,200,220,0.15) 50%, rgba(100,200,220,0.1) 75%, transparent 100%);
  pointer-events:none;
}

/* Corner accents — symmetric */
.login-card::after{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:
    linear-gradient(135deg, rgba(34,197,94,0.15) 0%, transparent 8%) 0 0 / 40px 40px no-repeat,
    linear-gradient(225deg, rgba(34,197,94,0.15) 0%, transparent 8%) 100% 0 / 40px 40px no-repeat,
    linear-gradient(45deg, rgba(34,197,94,0.15) 0%, transparent 8%) 0 100% / 40px 40px no-repeat,
    linear-gradient(315deg, rgba(34,197,94,0.15) 0%, transparent 8%) 100% 100% / 40px 40px no-repeat;
  pointer-events:none;opacity:0.5;
}

.panel-eyebrow{
  position:relative;z-index:1;
  font-family:var(--font-ui);font-size:11px;font-weight:600;
  color:#86efac;letter-spacing:2px;text-transform:uppercase;
  text-align:center;
}
.panel-title{
  position:relative;z-index:1;
  margin-top:8px;
  font-family:var(--font-display);font-size:24px;font-weight:700;letter-spacing:1px;
  text-align:center;
}
.panel-desc{
  position:relative;z-index:1;
  margin-top:8px;margin-bottom:24px;
  color:var(--text-secondary);font-size:13px;line-height:1.7;
  text-align:center;
}

/* ── Form ─────────────────────────────────────────── */
.login-form{
  position:relative;z-index:1;
  display:flex;flex-direction:column;gap:14px;
  animation:formEntry 1s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
  opacity:0;transform:translateY(15px);
}
@keyframes formEntry{
  to{opacity:1;transform:translateY(0)}
}

.input-group{position:relative}

.input-label{
  display:block;
  font-family:var(--font-ui);font-size:10px;font-weight:600;
  color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:5px;
}

.input-wrapper{
  position:relative;
  border-radius:var(--radius);
  border:1px solid var(--input-border);
  background:var(--input-bg);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow:hidden;
}
.input-wrapper:hover{border-color:rgba(148,163,184,0.25)}
.input-wrapper.focused{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow), 0 0 20px -5px var(--accent-glow);
}
.input-wrapper.focused::after{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg, transparent, rgba(34,197,94,0.05), transparent);
  animation:inputScan 2s ease-in-out infinite;
}
@keyframes inputScan{
  0%{left:-100%}100%{left:100%}
}
.input-wrapper::before{
  content:'';position:absolute;top:-1px;left:8px;
  width:20px;height:1px;background:var(--accent);opacity:0;
  transition:opacity 0.3s;z-index:2;
}
.input-wrapper.focused::before{opacity:0.8}

.input-field{
  width:100%;height:46px;
  padding:0 16px 0 44px;
  border:none;outline:none;background:transparent;
  color:var(--text-primary);
  font-family:var(--font-body);font-size:14px;letter-spacing:0.5px;
}
.input-field::placeholder{color:var(--text-muted);font-weight:300}

.input-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--text-muted);transition:color 0.3s;pointer-events:none;
}
.input-wrapper.focused .input-icon{color:var(--accent)}

.icon-svg{
  width:20px;height:20px;
  fill:none;stroke:currentColor;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;
  flex:0 0 auto;
}

.password-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--text-muted);padding:4px;
  display:flex;align-items:center;justify-content:center;
  transition:color 0.2s;
}
.password-toggle:hover{color:var(--text-secondary)}
.password-toggle .eye-open{display:none}
.password-toggle.show-password .eye-open{display:block}
.password-toggle.show-password .eye-off{display:none}

/* ── Remember / Forgot ────────────────────────────── */
.form-options{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:-2px;
}
.remember-me{
  display:flex;align-items:center;gap:8px;cursor:pointer;
  font-size:12px;color:var(--text-secondary);
}
.remember-me input[type="checkbox"]{
  appearance:none;-webkit-appearance:none;
  width:16px;height:16px;border-radius:4px;
  border:1.5px solid var(--input-border);background:var(--input-bg);
  cursor:pointer;position:relative;transition:all 0.2s;
}
.remember-me input[type="checkbox"]:checked{
  background:var(--accent);border-color:var(--accent);
}
.remember-me input[type="checkbox"]:checked::after{
  content:'✓';position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#fff;font-weight:700;
}
.forgot-link{
  font-size:12px;color:var(--accent);text-decoration:none;font-weight:500;
  transition:all 0.2s;position:relative;
}
.forgot-link::after{
  content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;
  background:var(--accent);transition:width 0.3s;
}
.forgot-link:hover::after{width:100%}

/* ── Login button ─────────────────────────────────── */
.login-btn{
  position:relative;
  width:100%;height:48px;
  margin-top:6px;border-radius:var(--radius);border:none;
  background:linear-gradient(135deg, var(--accent-deep), var(--accent), #34D399);
  background-size:200% 100%;
  color:#fff;
  font-family:var(--font-display);font-size:13px;font-weight:700;
  letter-spacing:4px;cursor:pointer;overflow:hidden;
  transition:all 0.3s;text-transform:uppercase;
}
.login-btn:hover{
  background-position:100% 0;
  box-shadow:0 0 30px var(--accent-glow), 0 4px 20px rgba(0,0,0,0.3);
  transform:translateY(-1px);
}
.login-btn:active{transform:translateY(0)}
.login-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transition:left 0.6s;
}
.login-btn:hover::before{left:100%}

/* ── Divider ──────────────────────────────────────── */
.divider{
  display:flex;align-items:center;gap:16px;margin:2px 0;
}
.divider-line{
  flex:1;height:1px;
  background:linear-gradient(90deg, transparent, var(--surface-border), transparent);
}
.divider-text{
  font-size:10px;color:var(--text-muted);letter-spacing:1px;font-weight:500;
  font-family:var(--font-ui);
}

/* ── SSO buttons ──────────────────────────────────── */
.sso-row{display:flex;gap:12px}
.sso-btn{
  flex:1;height:40px;border-radius:10px;
  border:1px solid var(--input-border);background:var(--input-bg);
  color:var(--text-secondary);
  font-family:var(--font-ui);font-size:12px;font-weight:600;letter-spacing:1px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.25s;
}
.sso-btn:hover{
  border-color:var(--accent);background:rgba(34,197,94,0.05);color:var(--text-primary);
}
.sso-btn svg{width:16px;height:16px}

/* ── Bottom bar ──────────────────────────────────── */
.bottom-bar{
  width:100%;
  display:flex;align-items:center;justify-content:center;gap:24px;
  margin-top:24px;
  animation:bottomEntry 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
  opacity:0;transform:translateY(15px);
}
@keyframes bottomEntry{
  to{opacity:1;transform:translateY(0)}
}
.bottom-chip{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:999px;
  background:rgba(15,23,42,0.3);
  border:1px solid rgba(255,255,255,0.02);
  color:var(--text-secondary);font-size:11px;letter-spacing:0.5px;
  backdrop-filter:blur(6px);
}
.bottom-chip .icon-svg{width:14px;height:14px;color:var(--accent)}

/* ── Data stream decoration (symmetric left/right) ── */
.data-stream{
  position:fixed;z-index:3;pointer-events:none;
  font-family:'Geist Mono','Courier New',monospace;
  font-size:10px;color:rgba(34,197,94,0.10);
  writing-mode:vertical-rl;line-height:1.8;letter-spacing:2px;
  white-space:nowrap;
}
.data-stream-left{
  left:32px;top:50%;transform:translateY(-50%);
  animation:streamScroll 30s linear infinite;
}
.data-stream-right{
  right:32px;top:50%;transform:translateY(-50%);
  animation:streamScroll 35s linear infinite reverse;
  opacity:0.7;
}
@keyframes streamScroll{
  0%{transform:translateY(-50%) translateX(0)}
  50%{transform:translateY(-30%) translateX(5px)}
  100%{transform:translateY(-50%) translateX(0)}
}

/* ── Status indicators (symmetric bottom corners) ─── */
.status-bar{
  position:fixed;bottom:20px;left:32px;z-index:10;
  display:flex;align-items:center;gap:8px;
  font-family:var(--font-ui);font-size:11px;
  color:var(--text-muted);letter-spacing:1px;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 8px var(--accent-glow);
  animation:statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse{
  0%,100%{opacity:0.5}50%{opacity:1}
}
.version-bar{
  position:fixed;bottom:20px;right:32px;z-index:10;
  font-family:var(--font-ui);font-size:11px;
  color:var(--text-muted);letter-spacing:1px;
}

/* ── Responsive ───────────────────────────────────── */
@media(max-width:600px){
  .login-wrapper{padding:16px}
  .login-stage{max-width:100%}
  .login-card{padding:28px 20px 24px}
  .bottom-bar{flex-wrap:wrap;gap:8px}
  .bottom-chip{font-size:10px;padding:6px 12px}
  .data-stream{display:none}
}
</style>
</head>
<body>

<!-- Aurora layer -->
<div class="aurora"><div class="aurora-mid"></div></div>

<!-- Radar canvas -->
<canvas id="radarCanvas"></canvas>

<!-- Particle background -->
<canvas id="particleCanvas"></canvas>

<!-- Grid overlay -->
<div class="grid-overlay"></div>

<!-- Central axis line -->
<div class="axis-line"></div>

<!-- Ambient glow -->
<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>
<div class="ambient ambient-3"></div>

<!-- Scan line -->
<div class="scan-line"></div>

<!-- Data stream decoration -->
<div class="data-stream data-stream-left" id="dataStreamL"></div>
<div class="data-stream data-stream-right" id="dataStreamR"></div>

<!-- Login -->
<div class="login-wrapper">
  <div class="login-stage">

    <!-- Central login card -->
    <div class="login-card">
      <div class="brand-bar">
        <div class="logo-container">
          <div class="logo-glow"></div>
          <svg class="logo-svg" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="ringChrome" x1="18" y1="12" x2="142" y2="148" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#f0f6ff"/>
                <stop offset="12%"  stop-color="#a8b8cc"/>
                <stop offset="25%"  stop-color="#f4f8fc"/>
                <stop offset="40%"  stop-color="#7a8da2"/>
                <stop offset="55%"  stop-color="#dce6f0"/>
                <stop offset="70%"  stop-color="#5a6d82"/>
                <stop offset="82%"  stop-color="#c4d0dc"/>
                <stop offset="95%"  stop-color="#eaf0f6"/>
                <stop offset="100%" stop-color="#8a9cb0"/>
              </linearGradient>
              <linearGradient id="arrowGreen" x1="104" y1="20" x2="130" y2="58" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#86efac"/>
                <stop offset="35%"  stop-color="#22C55E"/>
                <stop offset="75%"  stop-color="#15803d"/>
                <stop offset="100%" stop-color="#16A34A"/>
              </linearGradient>
              <filter id="ringSheen" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
                <feGaussianBlur in="SourceAlpha" stdDeviation="1.8" result="shadow"/>
                <feOffset in="shadow" dx="0" dy="1.5" result="shadowOff"/>
                <feFlood flood-color="#0a1420" flood-opacity="0.48" result="shadowColor"/>
                <feComposite in="shadowColor" in2="shadowOff" operator="in" result="shadowComp"/>

<script>
/* ═══════════════════════════════════════════════════════
   Radar Wave — centered expanding rings
   ═══════════════════════════════════════════════════════ */
(function(){
  const rc = document.getElementById('radarCanvas');
  const rctx = rc.getContext('2d');
  let rw, rh;
  function radarResize(){ rw = rc.width = window.innerWidth; rh = rc.height = window.innerHeight; }
  window.addEventListener('resize', radarResize); radarResize();

  // Each ring: { r, maxR, alpha }
  const rings = [];
  const RING_INTERVAL = 3200; // ms between new rings
  const RING_SPEED   = 0.5;   // px per frame
  const RING_COLORS  = [
    [34,197,94],   // green
    [6,182,212],   // cyan
    [34,197,94],
  ];
  let lastRing = 0, colorIdx = 0;

  function radarFrame(ts){
    rctx.clearRect(0,0,rw,rh);
    const cx = rw/2, cy = rh/2;

    // Spawn new ring
    if(ts - lastRing > RING_INTERVAL){
      const col = RING_COLORS[colorIdx % RING_COLORS.length];
      rings.push({ r:0, maxR: Math.max(rw,rh)*0.55, alpha:0.35, col });
      colorIdx++;
      lastRing = ts;
    }

    // Draw & advance rings
    for(let i = rings.length-1; i>=0; i--){
      const rg = rings[i];
      rg.r += RING_SPEED;
      rg.alpha = 0.35 * (1 - rg.r/rg.maxR);
      if(rg.alpha <= 0){ rings.splice(i,1); continue; }

      const grad = rctx.createRadialGradient(cx,cy,Math.max(0,rg.r-2), cx,cy,rg.r+2);
      grad.addColorStop(0, `rgba(${rg.col},0)`);
      grad.addColorStop(0.5, `rgba(${rg.col},${rg.alpha})`);
      grad.addColorStop(1, `rgba(${rg.col},0)`);

      rctx.beginPath();
      rctx.arc(cx,cy,rg.r,0,Math.PI*2);
      rctx.strokeStyle = grad;
      rctx.lineWidth = 1.5;
      rctx.stroke();
    }
    requestAnimationFrame(radarFrame);
  }
  requestAnimationFrame(radarFrame);
})();

/* ═══════════════════════════════════════════════════════
   Particle System  — constellation + twinkling + shooting stars
   ═══════════════════════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [], meteors = [], mouse = {x:-9999, y:-9999};
  const PARTICLE_COUNT = 80;
  const MAX_DIST = 140;
  const COLORS = ['rgba(34,197,94,', 'rgba(6,182,212,', 'rgba(148,163,184,', 'rgba(255,255,255,'];

  function resize(){ w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  class Particle {
    constructor(){
      this.reset();
    }
    reset(){
      this.x = Math.random()*w;
      this.y = Math.random()*h;
      this.vx = (Math.random()-0.5)*0.35;
      this.vy = (Math.random()-0.5)*0.35;
      this.r = Math.random()*1.6+0.4;
      this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
      // Twinkling
      this.baseAlpha = Math.random()*0.35+0.05;
      this.alpha = this.baseAlpha;
      this.twinkleSpeed = Math.random()*0.015+0.003;
      this.twinklePhase = Math.random()*Math.PI*2;
      // Bright star: ~15% chance
      this.isStar = Math.random()<0.15;
      if(this.isStar){ this.r = Math.random()*1.2+0.8; this.color='rgba(255,255,255,'; }
    }
    update(t){
      this.x += this.vx; this.y += this.vy;
      if(this.x<0||this.x>w) this.vx*=-1;
      if(this.y<0||this.y>h) this.vy*=-1;
      // Mouse repulsion
      const dx=this.x-mouse.x, dy=this.y-mouse.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        const force=(120-dist)/120*0.5;
        this.vx+=(dx/dist)*force; this.vy+=(dy/dist)*force;
      }
      this.vx*=0.99; this.vy*=0.99;
      // Twinkle
      this.alpha = this.baseAlpha + Math.sin(t*this.twinkleSpeed+this.twinklePhase)*this.baseAlpha*0.8;
      this.alpha = Math.max(0.01, Math.min(0.9, this.alpha));
    }
    draw(){
      if(this.isStar && this.alpha>0.3){
        // Star cross glow
        const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*4);
        g.addColorStop(0, `rgba(255,255,255,${this.alpha*0.6})`);
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.beginPath(); ctx.arc(this.x,this.y,this.r*4,0,Math.PI*2);
        ctx.fillStyle=g; ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.fillStyle=this.color+this.alpha+')';
      ctx.fill();
    }
  }

  class Meteor {
    constructor(){
      // Start from random top/right edge
      const edge = Math.random();
      if(edge<0.5){ this.x=Math.random()*w; this.y=-10; }
      else { this.x=w+10; this.y=Math.random()*h*0.5; }
      const angle = Math.PI/4 + (Math.random()-0.5)*0.4;
      const speed = 6+Math.random()*8;
      this.vx = Math.cos(angle)*speed;
      this.vy = Math.sin(angle)*speed;
      this.len = 60+Math.random()*80;
      this.alpha = 0.7+Math.random()*0.3;
      this.life = 1.0;
      this.decay = 0.018+Math.random()*0.012;
      this.col = Math.random()<0.6 ? [34,197,94] : [255,255,255];
    }
    update(){ this.x+=this.vx; this.y+=this.vy; this.life-=this.decay; }
    draw(){
      if(this.life<=0) return;
      const a = this.life*this.alpha;
      const ex = this.x - this.vx/Math.hypot(this.vx,this.vy)*this.len;
      const ey = this.y - this.vy/Math.hypot(this.vx,this.vy)*this.len;
      const g = ctx.createLinearGradient(ex,ey,this.x,this.y);
      g.addColorStop(0,'rgba('+this.col+',0)');
      g.addColorStop(0.7,'rgba('+this.col+','+a*0.4+')');
      g.addColorStop(1,'rgba('+this.col+','+a+')');
      ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(this.x,this.y);
      ctx.strokeStyle=g; ctx.lineWidth=1.5; ctx.stroke();
      // Head glow
      const hg=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,5);
      hg.addColorStop(0,'rgba('+this.col+','+a+')');
      hg.addColorStop(1,'rgba('+this.col+',0)');
      ctx.beginPath(); ctx.arc(this.x,this.y,5,0,Math.PI*2);
      ctx.fillStyle=hg; ctx.fill();
    }
    get dead(){ return this.life<=0 || this.x>w+50 || this.y>h+50; }
  }

  for(let i=0;i<PARTICLE_COUNT;i++) particles.push(new Particle());

  // Spawn meteor periodically
  let lastMeteor=0;
  const METEOR_INTERVAL = 4500;

  function animate(t){
    ctx.clearRect(0,0,w,h);

    // Spawn meteor
    if(t - lastMeteor > METEOR_INTERVAL && Math.random()<0.6){
      meteors.push(new Meteor()); lastMeteor=t;
    }

    // Draw constellation lines
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<MAX_DIST){
          const alpha=(1-dist/MAX_DIST)*0.12;
          ctx.strokeStyle=`rgba(34,197,94,${alpha})`;
          ctx.lineWidth=0.5;
          ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke();
        }
      }
    }
    // Mouse links
    for(let p of particles){
      const dx=p.x-mouse.x, dy=p.y-mouse.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<180){
        const alpha=(1-dist/180)*0.28;
        ctx.strokeStyle=`rgba(34,197,94,${alpha})`;
        ctx.lineWidth=0.8;
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(mouse.x,mouse.y); ctx.stroke();
      }
    }
    // Particles
    for(let p of particles){ p.update(t); p.draw(); }
    // Meteors
    for(let i=meteors.length-1;i>=0;i--){
      meteors[i].update(); meteors[i].draw();
      if(meteors[i].dead) meteors.splice(i,1);
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  document.addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999;});
})();

/* ═══════════════════════════════════════════════════════
   Data stream decoration
   ═══════════════════════════════════════════════════════ */
(function(){
  const chars = '0123456789ABCDEFabcdef.:;{}[]<>/\\|=+-*&^%$#@!';
  function genStream(len){
    let s='';
    for(let i=0;i<len;i++) s+=chars[Math.floor(Math.random()*chars.length)];
    return s;
  }
  document.getElementById('dataStreamL').textContent = genStream(200);
  document.getElementById('dataStreamR').textContent = genStream(200);
  setInterval(()=>{
    document.getElementById('dataStreamL').textContent = genStream(200);
    document.getElementById('dataStreamR').textContent = genStream(200);
  }, 15000);
})();

/* ═══════════════════════════════════════════════════════
   Interactions
   ═══════════════════════════════════════════════════════ */
function togglePassword(){
  const inp = document.getElementById('password');
  const toggle = document.getElementById('toggleEye');
  if(inp.type==='password'){
    inp.type='text';
    toggle.classList.add('show-password');
    toggle.setAttribute('aria-label','隐藏密码');
  } else {
    inp.type='password';
    toggle.classList.remove('show-password');
    toggle.setAttribute('aria-label','显示密码');
  }
}

function handleLogin(){
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span style="display:inline-flex;align-items:center;gap:8px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke-dasharray="30 60"/></svg> 验证中...</span>';
  btn.style.pointerEvents='none';
  setTimeout(()=>{
    btn.innerHTML='<span>✓ 登录成功</span>';
    btn.style.background='linear-gradient(135deg,#16A34A,#22C55E)';
  },1200);
  setTimeout(()=>{
    window.location.href='dashboard.html';
  },1900);
}

const style=document.createElement('style');
style.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(style);
</script>
