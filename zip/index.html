<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>NGPM · 应用分析</title>
<!-- Inject CSS inline to make it work standalone without the other files for context -->
<style>
body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #050608; color: #e2e8f0; overflow: hidden; }
* { box-sizing: border-box; }
.material-symbols-rounded { font-family: 'Material Symbols Rounded'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-smoothing: antialiased; }
.page-tabs { display: flex; gap: 0; padding: 0 20px; background: #0B0E14; border-bottom: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
.page-tab { height: 42px; padding: 0 16px; display: flex; align-items: center; gap: 6px; font-size: 13px; color: #64748b; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; text-decoration: none; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
.page-tab:hover { color: #e2e8f0; }
.page-tab.active { color: #22d3ee; border-bottom-color: #22d3ee; text-shadow: 0 0 10px rgba(34,211,238,0.5); }
.page-tab .material-symbols-rounded { font-size: 15px; }

/* === Tab button reset === */
button.page-tab { background: none; border: none; font-family: inherit; outline: none; }
.app-tab-content { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; height: calc(100vh - 100px); }

/* ===== 统一拓扑 - Immersive Theme ===== */
.unified-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#050608; }
.unified-toolbar { display:flex; align-items:center; gap:12px; padding:10px 20px; background:#0B0E14; border-bottom:1px solid rgba(255,255,255,0.1); flex-shrink:0; flex-wrap:wrap; position: relative; z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.unified-mode-seg { display:flex; gap:0; border:1px solid rgba(255,255,255,0.1); border-radius:6px; overflow:hidden; background: rgba(255,255,255,0.05); }
.unified-mode-btn { min-width:90px; height:30px; padding:0 14px; border:none; background:transparent; color:#64748b; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s; border-right:1px solid rgba(255,255,255,0.1); font-family:inherit; text-transform: uppercase; }
.unified-mode-btn:last-child { border-right:none; }
.unified-mode-btn:hover { background:rgba(255,255,255,0.05); color:#e2e8f0; }
.unified-mode-btn.active { background:rgba(6,182,212,0.1); color:#22d3ee; box-shadow:inset 0 0 12px rgba(6,182,212,0.3); text-shadow: 0 0 8px rgba(34,211,238,0.5); border-color: rgba(6,182,212,0.3); }
.unified-capability-badge { display:flex; align-items:center; gap:6px; padding:4px 10px; border-radius:6px; background:rgba(6,182,212,0.1); border:1px solid rgba(6,182,212,0.3); font-size:11px; font-weight:700; color:#22d3ee; text-transform: uppercase; box-shadow: 0 0 10px rgba(6,182,212,0.2); }
.unified-capability-badge .material-symbols-rounded { font-size:14px; text-shadow: 0 0 5px rgba(34,211,238,0.8); }
.unified-search { display:flex; align-items:center; gap:6px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:0 10px; height:30px; min-width:160px; transition: border-color 0.2s; }
.unified-search:focus-within { border-color: rgba(6,182,212,0.3); box-shadow: 0 0 10px rgba(6,182,212,0.2); }
.unified-search .material-symbols-rounded { font-size:15px; color:#64748b; }
.unified-search input { border:none; outline:none; background:transparent; font-size:12px; color:#e2e8f0; width:100%; font-family:inherit; }
.unified-search input::placeholder { color:#475569; }
.unified-spacer { flex:1; }
.unified-main { flex:1; display:flex; overflow:hidden; position: relative; }
.unified-graph { flex:1; overflow:hidden; position:relative; background:radial-gradient(circle at center, #111827 0%, #050608 100%); }
.unified-graph::before { content: ""; position: absolute; inset: 0; background-image: radial-gradient(#4b5563 1px, transparent 1px); background-size: 30px 30px; opacity: 0.1; pointer-events: none; z-index: 0; }
.unified-graph-chart { width:100%; height:100%; min-width:1100px; position: relative; z-index: 1; }
.unified-detail { width:320px; background:rgba(15,23,42,0.8); backdrop-filter: blur(8px); border-left:1px solid rgba(255,255,255,0.1); display:flex; flex-direction:column; flex-shrink:0; box-shadow: -5px 0 25px rgba(0,0,0,0.5); z-index: 5; }
.unified-detail-visible { display:flex; animation: slideInX 0.2s ease-out; }
.unified-detail-hidden { display:none; }
@keyframes slideInX { from { transform: translateX(100%); } to { transform: translateX(0); } }
.unified-dt-head { padding:13px 18px; border-bottom:1px solid rgba(255,255,255,0.1); background:#0B0E14; display:flex; align-items:center; justify-content:space-between; gap:8px; flex-shrink:0; }
.unified-dt-title { font-size:11px; font-weight:800; color:#fff; letter-spacing:0.05em; text-transform: uppercase; }
.unified-dt-close { background:none; border:none; color:#64748b; cursor:pointer; font-size:17px; padding:4px; border-radius: 4px; transition: color 0.15s; display: flex; align-items: center; justify-content: center; }
.unified-dt-close:hover { color:#fff; background: rgba(255,255,255,0.1); }
.unified-dt-body { flex:1; overflow-y:auto; padding:18px; }
.unified-dt-name { font-size:14px; font-weight:700; color:#fff; margin-bottom:14px; line-height:1.4; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-shadow: 0 0 10px rgba(255,255,255,0.2); }
.unified-dt-row { margin-bottom:12px; display:flex; flex-direction:column; gap:4px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }
.unified-dt-label { font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:0.05em; }
.unified-dt-value { font-size:12px; color:#e2e8f0; font-family:'Geist Mono', ui-monospace, monospace; word-break: break-all; }

/* Special text colors for status */
.red { color: #ef4444 !important; text-shadow: 0 0 8px rgba(239,68,68,0.5); }
.yellow { color: #f97316 !important; text-shadow: 0 0 8px rgba(249,115,22,0.5); }
.green { color: #4ade80 !important; text-shadow: 0 0 8px rgba(74,222,128,0.5); }

/* Badges */
.unified-dt-badge { display: inline-flex; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; width: fit-content; text-transform: uppercase; }
.unified-dt-badge.ok { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; text-shadow: 0 0 5px rgba(74,222,128,0.5); box-shadow: 0 0 10px rgba(74,222,128,0.2); }
.unified-dt-badge.slow { background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.3); color: #f97316; text-shadow: 0 0 5px rgba(249,115,22,0.5); box-shadow: 0 0 10px rgba(249,115,22,0.2); }
.unified-dt-badge.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; text-shadow: 0 0 5px rgba(239,68,68,0.5); box-shadow: 0 0 10px rgba(239,68,68,0.2); }

.unified-dt-deps { margin-top: 16px; }
.unified-dt-dep-item { font-size: 11px; color: #94a3b8; padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.2); }
.unified-dt-dep-item .material-symbols-rounded { font-size: 14px; color: #22d3ee; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="/unified-topo-demo.js"></script>
</head>
<body>
<div class="app">
  <main class="main" style="height:100vh; display:flex; flex-direction:column">
    <header class="top-header" style="display:flex; align-items:center; gap:12px; padding:16px 20px; background:#0B0E14; border-bottom:1px solid rgba(255,255,255,0.1)">
      <span class="material-symbols-rounded page-icon" style="color:#22d3ee; text-shadow:0 0 10px rgba(34,211,238,0.5)">apps</span>
      <span class="page-title" style="font-weight:700; font-size:16px; color:#fff">应用性能分析 · NGPM 统一拓扑原型展示</span>
    </header>

    <div class="page-tabs">
      <button class="page-tab" id="ptab-ai"><span class="material-symbols-rounded">psychology</span>AI 应用助手</button>
      <button class="page-tab" id="ptab-perf"><span class="material-symbols-rounded">speed</span>应用性能总览</button>
      <button class="page-tab active" id="ptab-unified" onclick="showAppTab('unified')"><span class="material-symbols-rounded">hub</span>统一拓扑 (L7+L4)</button>
    </div>

    <!-- ===== 统一拓扑 ===== -->
    <div id="app-tab-unified" class="app-tab-content">
      <div class="unified-wrap">
        <div class="unified-toolbar">
          <div class="unified-mode-seg">
            <button class="unified-mode-btn active" onclick="setUnifiedMode('fusion')" data-mode="fusion">融合视图</button>
            <button class="unified-mode-btn" onclick="setUnifiedMode('span')" data-mode="span">网络拓扑 (物理层)</button>
            <button class="unified-mode-btn" onclick="setUnifiedMode('ebpf')" data-mode="ebpf">依赖视图 (应用层)</button>
          </div>
          <div class="unified-capability-badge">
            <span class="material-symbols-rounded">check_circle</span>
            <span id="capabilityText">全栈融合视图 (L7 + L4)</span>
          </div>
          <div class="unified-search">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="unifiedSearch" placeholder="搜索节点..." onkeyup="unifiedFilter(this.value)">
          </div>
          <div class="unified-spacer"></div>
        </div>
        <div class="unified-main">
          <div class="unified-graph">
            <div id="unifiedChart" class="unified-graph-chart"></div>
          </div>
          <div class="unified-detail unified-detail-hidden" id="unifiedDetailPanel">
            <div class="unified-dt-head">
              <div class="unified-dt-title"><span class="material-symbols-rounded" style="font-size:14px;vertical-align:middle;margin-right:4px">memory</span>节点/流 深度剖析</div>
              <button class="unified-dt-close" onclick="closeUnifiedDetail()">✕</button>
            </div>
            <div class="unified-dt-body" id="unifiedDetailContent"></div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
function showAppTab(tabId, context) {
  // Demo override
  if (tabId === 'unified') {
    renderUnifiedGraph();
  }
}
document.addEventListener('DOMContentLoaded', function() {
  if (typeof renderUnifiedGraph === 'function') {
    renderUnifiedGraph();
  }
});
</script>
</body>
</html>
